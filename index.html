<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heart.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#f472b6" />
    <meta name="color-scheme" content="only light" />
    <style>html{color-scheme:light}html.dark{color-scheme:dark}</style>
    <script>
      // Sync dark class before first paint to avoid flash
      try{var t=localStorage.getItem('lejla_theme');if(t==='dark'){document.documentElement.classList.add('dark');document.querySelector('meta[name="color-scheme"]').content='dark';document.querySelector('meta[name="theme-color"]').content='#1e1b2e'}}catch(e){}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <title>Lejla & Hamza ❤️</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
